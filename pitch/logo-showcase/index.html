<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ReplayFence Logo Showcase</title>
    <style>
      body { margin: 0; background: #101411; color: #f4f0e6; font-family: Arial, sans-serif; }
      main { padding: 48px; display: grid; gap: 24px; }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
      .card { border: 1px solid #2d3c34; border-radius: 16px; padding: 24px; background: #151b17; }
      img { max-width: 100%; height: 120px; object-fit: contain; }
      code { color: #38f8b8; }
    </style>
  </head>
  <body>
    <main>
      <h1>ReplayFence logo direction</h1>
      <p>Geometric latch/fence mark, proof green, replay rejection red, testbench dark surface.</p>
      <section class="grid">
        <div class="card"><img src="../../public/brand/logomark.svg" alt="logomark" /><p><code>logomark.svg</code></p></div>
        <div class="card"><img src="../../public/brand/wordmark.svg" alt="wordmark" /><p><code>wordmark.svg</code></p></div>
        <div class="card"><img src="../../public/brand/logo-mono.svg" alt="mono mark" /><p><code>logo-mono.svg</code></p></div>
      </section>
    </main>
  </body>
</html>
